doctrine:
    dbal:
        default_connection: default
        connections:
            default:
                # The configuration is inside DatabaseCredentialsProvider
                driver: pdo_mysql
                host: placeholder
                port: placeholder
                user: placeholder
                password: placeholder
                dbname: placeholder
                server_version: 0.0.1 # This is a placeholder value
                wrapper_class: App\Shared\Persistence\DBAL\ClientConnectionWrapper
                mapping_types:
                    enum: string
                logging: false
                profiling: true
            core:
                # The configuration is inside DatabaseCredentialsProvider
                driver: pdo_mysql
                host: placeholder
                port: placeholder
                user: placeholder
                password: placeholder
                dbname: placeholder
                server_version: 0.0.1 # This is a placeholder value
                wrapper_class: App\Shared\Persistence\DBAL\CoreConnectionWrapper
                mapping_types:
                    enum: string
                logging: false
                profiling: true


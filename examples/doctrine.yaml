    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        controller_resolver:
            auto_mapping: false

        entity_managers:
            default:
                validate_xml_mapping: true
                auto_mapping: true
                report_fields_where_declared: true
                naming_strategy: App\Shared\Persistence\NamingStrategy\CedrisNamingStrategy

                connection: default
                mappings:
                  App\Accounting\Abacus:
                    type: attribute
                    is_bundle: false
                    dir: '%kernel.project_dir%/src/Accounting/Abacus/Entity'
                    prefix: 'App\Accounting\Abacus\Entity'
                    alias: App
                  App\Auth\ActiveUserStatistics:
                    type: attribute
                    is_bundle: false
                    dir: '%kernel.project_dir%/src/Auth/ActiveUserStatistics/Entity'
                    prefix: 'App\Auth\ActiveUserStatistics\Entity'
                    alias: App
                  App\Auth\User:
                    type: attribute
                    is_bundle: false
                    dir: '%kernel.project_dir%/src/Auth/User/Entity'
                    prefix: 'App\Auth\User\Entity'
                    alias: App
                  GesdinetJWTRefreshTokenBundle:
                    type: xml
                    is_bundle: false
                    dir: '%kernel.project_dir%/vendor/gesdinet/jwt-refresh-token-bundle/Resources/config/doctrine'
                    prefix: 'Gesdinet\JWTRefreshTokenBundle\Entity'
                    alias: GesdinetJWTRefreshTokenBundle
                  App\ClientAddress\Checklist:
                    type: attribute
                    is_bundle: false
                    dir: '%kernel.project_dir%/src/ClientAddress/Checklist/Entity'
                    prefix: 'App\ClientAddress\Checklist\Entity'
                    alias: App
                  App\ClientAddress\ClientAddress:
